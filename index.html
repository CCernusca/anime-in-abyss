<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime in Abyss</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Anime in Abyss</h1>
    <p>How niche is your anime?</p>
  </header>

  <main>
    <section id="search">
      <input type="text" id="anime-input" placeholder="Enter an anime title...">
      <button id="search-btn">Descend</button>
    </section>

    <section id="result" hidden>
      <h2 id="result-title"></h2>
      <p id="result-score"></p>
      <p id="result-layer"></p>
    </section>
  </main>

  <footer>
    <p>Made in Abyss references used for illustrative purposes only.</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
